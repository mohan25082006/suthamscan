version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3-alpine
    environment:
      POSTGRES_USER: sutham_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: sutham_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sutham_user -d sutham_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
